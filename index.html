<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Army Agniveer & TA Portal</title>
    <style>
        /* 🎨 आर्मी थीम का पूरा डिज़ाइन यहाँ इन-बिल्ट है */
        :root {
            --bg-dark: #0b132b;
            --card-bg: #1c2541;
            --border-color: #233565;
            --gold: #e5a93b;
            --text-muted: #8da2bb;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #app {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 🎖️ हेडर और टाइटल स्टाइल्स */
        .app-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--gold);
            text-align: center;
            letter-spacing: 2px;
            margin-top: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .app-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* 🗂️ होम स्क्रीन कार्ड्स */
        .paper-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .paper-card:hover {
            transform: translateY(-2px);
            border-color: var(--gold);
        }

        .icon-badge {
            background: #233565;
            color: var(--gold);
            font-weight: bold;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 6px;
            margin-right: 15px;
            min-width: 45px;
            text-align: center;
        }

        /* 🎛️ ऑप्शन्स और मॉक टेस्ट ग्रिड */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .opt-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .opt-box:hover {
            border-color: var(--gold);
            background: #222e54;
        }

        .mock-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 15px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 5px;
        }

        .mock-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }

        .mock-btn:hover {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }

        /* 🔙 बैक बटन */
        .back-btn {
            background: none;
            border: 1px solid #4b5563;
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 6px;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        .back-btn:hover {
            color: #fff;
            border-color: #fff;
        }

        /* 📋 लिस्ट कंटेनर */
        .list-container {
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- इसी बॉक्स के अंदर पूरा ऐप (होम स्क्रीन, ग्रिड और टेस्ट रूम) लोड होगा -->
    <div id="app"></div>

    <!-- 🌐 गिटहब रूट से 'gd_mock_1.js' लोड करने के लिए छुपा हुआ कंटेनर -->
    <div id="test-data-loader" style="display: none;"></div>

    <!-- मुख्य जावास्क्रिप्ट फ़ाइल -->
    <script src="script.js"></script>
</body>
</html>
